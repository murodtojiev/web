<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tojiyev Murodbekning shaxsiy portfolio sahifasi.">

    <meta property="og:title" content="Murodbek Tojiyev - Portfolio">
    <meta property="og:description" content="Telefon raqam : +998 50 027 5255">
    <meta property="og:image" content="https://github.com/murodtojiev.png">
    <meta property="og:type" content="website">

    <title>Murodbek - Portfolio</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-1: #fdfcf9;
            --bg-2: #eef5ff;
            --card: rgba(255, 255, 255, 0.75);
            --text: #1a1d23;
            --muted: #5f6775;
            --line: rgba(26, 29, 35, 0.06);
            --shadow: 0 30px 90px rgba(0, 0, 0, 0.08);
            --accent: #2563eb;
            --github: #181717;
            --instagram: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --glass: rgba(255, 255, 255, 0.4);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 20px;
            font-family: 'Outfit', sans-serif;
            color: var(--text);
            background: 
                radial-gradient(circle at 10% 10%, rgba(37, 99, 235, 0.05), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(245, 158, 11, 0.05), transparent 40%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            overflow-x: hidden;
        }

        .card {
            width: min(100%, 400px);
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px;
            text-align: center;
            background: var(--card);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .profile-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
        }

        .profile-container::before {
            content: '';
            position: absolute;
            inset: -5px;
            background: linear-gradient(135deg, #2563eb, #f59e0b);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.3;
            filter: blur(8px);
            animation: pulse 4s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.5; }
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .badge {
            display: inline-block;
            background: rgba(37, 99, 235, 0.08);
            color: var(--accent);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .bio {
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 56px;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
        }

        .btn-github { background: var(--github); color: white; }
        .btn-instagram { background: var(--instagram); color: white; }
        .btn-primary { 
            background: white; 
            color: var(--accent); 
            border: 1px solid rgba(37, 99, 235, 0.2);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.05);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
            filter: brightness(1.1);
        }

        .btn:active { transform: translateY(-1px); }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: grid;
            place-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            width: min(100%, 420px);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 32px;
            padding: 35px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.15);
            transform: scale(0.9) translateY(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(0,0,0,0.05);
            border: none;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: 0.2s;
        }

        .close-btn:hover { background: rgba(0,0,0,0.1); }

        .modal h2 {
            margin-top: 0;
            font-size: 24px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 6px;
            margin-left: 4px;
        }

        .input-group input, 
        .input-group textarea {
            width: 100%;
            padding: 14px 18px;
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.08);
            background: white;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s;
        }

        .input-group input:focus, 
        .input-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .input-group textarea {
            min-height: 120px;
            resize: none;
        }

        .submit-btn {
            width: 100%;
            height: 56px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status-msg {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }

        .footer-text {
            margin-top: 25px;
            font-size: 13px;
            color: #a0a6b1;
        }
    </style>
</head>
<body>
    <main class="card">
        <div class="profile-container">
            <img src="https://github.com/murodtojiev.png" alt="Murodbek Tojiyev" class="profile-img">
        </div>

        <span class="badge">TUIT Student</span>
        <h1>Murodbek Tojiyev</h1>

        <p class="bio">
            Salom! Men TATU talabasiman. 2007-yil 12-dekabrda tug'ilganman. Men haqimda ko'proq ma'lumot olish uchun instagram yoki github profilimga tashrif buyuring.
        </p>

        <div class="actions">
            <a href="https://github.com/murodtojiev" class="btn btn-github" target="_blank">GitHub Profile</a>
            <a href="https://www.instagram.com/murodtojiev_" class="btn btn-instagram" target="_blank">Instagram</a>
            <button class="btn btn-primary" id="openChat">Menga yozish uchun</button>
        </div>

        <!-- <div class="footer-text">Sayt test jarayonida &bull; 2026</div> -->
    </main>

    <!-- Modal HTML -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="close-btn" id="closeChat">&times;</button>
            <h2>Menga yozing</h2>
            
            <form id="contact-form">
                <div class="input-group">
                    <label>To'liq ismingiz</label>
                    <input type="text" name="name" placeholder="Masalan: Falonchiyev Pistonchi" required>
                </div>
                
                <div class="input-group">
                    <label>Telegram foydalanuvchi nomi</label>
                    <input type="text" name="telegram" placeholder="@username" required>
                </div>

                <div class="input-group">
                    <label>Xabaringiz</label>
                    <textarea name="message" placeholder="Xabaringizni bu yerga yozing..." required></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Yuborish</button>
                <div class="status-msg" id="status"></div>
            </form>
        </div>
    </div>

    <script>
        const openBtn = document.getElementById('openChat');
        const closeBtn = document.getElementById('closeChat');
        const overlay = document.getElementById('modalOverlay');
        const form = document.getElementById('contact-form');
        const status = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        // Modal functions
        openBtn.addEventListener('click', () => {
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        });

        closeBtn.addEventListener('click', () => {
            overlay.classList.remove('active');
            document.body.style.overflow = '';
        });

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        });

        // Form handling
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            const payload = {
                name: formData.get('name'),
                telegram: formData.get('telegram'),
                message: formData.get('message')
            };

            submitBtn.disabled = true;
            status.textContent = "Yuborilmoqda...";
            status.style.color = "var(--accent)";

            try {
                const response = await fetch('/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.error || "Xatolik yuz berdi");

                status.textContent = "✅ Xabar yuborildi! Tez orada javob beraman.";
                status.style.color = "#10b981";
                form.reset();
                
                setTimeout(() => {
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                    status.textContent = "";
                }, 2500);

            } catch (err) {
                status.textContent = "❌ " + err.message;
                status.style.color = "#ef4444";
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
